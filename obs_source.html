<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fonte Ativa CamCmd</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: cover; background: transparent; }
</style>
</head>
<body>

<video id="remoteVideo" autoplay playsinline></video>

<script>
const urlParams = new URLSearchParams(window.location.search);
const camId = urlParams.get('cam') || 'CAM1'; 

const peer = new Peer(camId, {
  config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
});

let cellDataConn = null;
let conexaoDiretor = null;

// Tenta linkar essa fonte com o painel do diretor para troca de dados
peer.on('open', () => {
  conectarAoDiretor();
});

function conectarAoDiretor() {
  conexaoDiretor = peer.connect('CAM-DIRETOR-PAINEL');
  conexaoDiretor.on('error', () => setTimeout(conectarAoDiretor, 5000)); // Reconecta se o painel abrir depois
}

peer.on('connection', (conn) => {
  // Ignora se for o painel tentando conectar por engano
  if (conn.peer === 'CAM-DIRETOR-PAINEL') return;

  cellDataConn = conn;
  console.log('Celular linkado na fonte: ' + camId);

  // Avisa o painel do diretor qual é o ID real deste celular na rede
  if (conexaoDiretor && conexaoDiretor.open) {
    conexaoDiretor.send({
      type: 'registro_celular',
      cam: camId,
      celularPeerId: conn.peer
    });
  }
});

peer.on('call', (call) => {
  call.answer();
  call.on('stream', (remoteStream) => {
    document.getElementById('remoteVideo').srcObject = remoteStream;
  });
});

// Comando de Tally vindo do Script Lua
window.atualizarTallyDoOBS = function(estado) {
  if (cellDataConn && cellDataConn.open) {
    cellDataConn.send({ type: 'tally', state: estado });
  }
};
</script>
</body>
</html>
