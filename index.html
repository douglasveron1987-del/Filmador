<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="mobile-web-app-capable" content="yes">
<title>Filmador</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Helvetica Neue',Arial,sans-serif; -webkit-user-select:none; user-select:none; }

  /* ── SETUP ── */
  #setupScreen {
    position:fixed; inset:0; background:#0c0c0e;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; padding:40px 32px;
  }
  .setup-logo { font-size:10px; font-weight:700; letter-spacing:0.3em; color:rgba(255,255,255,0.18); text-transform:uppercase; margin-bottom:48px; }
  #deviceNameDisplay { font-size:28px; font-weight:600; color:#fff; text-align:center; margin-bottom:8px; cursor:pointer; }
  .setup-subtitle { font-size:14px; color:rgba(255,255,255,0.3); margin-bottom:44px; text-align:center; }
  .server-toggle { font-size:12px; color:rgba(255,255,255,0.22); cursor:pointer; margin-bottom:12px; text-decoration:underline; text-underline-offset:3px; text-decoration-color:rgba(255,255,255,0.12); }
  #serverWrap { display:block; width:100%; max-width:300px; margin-bottom:20px; }
  .setup-server-input { background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; font-size:14px; padding:12px 16px; outline:none; width:100%; text-align:center; font-family:'SF Mono','Courier New',monospace; -webkit-appearance:none; }
  .start-btn { width:100%; max-width:300px; padding:18px; border-radius:16px; border:none; background:#fff; color:#000; font-size:17px; font-weight:700; cursor:pointer; margin-top:8px; transition:opacity 0.15s,transform 0.1s; }
  .start-btn:active { opacity:0.75; transform:scale(0.98); }

  /* ── CAM SCREEN ── */
  #camScreen { position:fixed; inset:0; display:none; }
  video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  /* ── TALLY BORDER ── */
  #tallyBorder { position:absolute; inset:0; border:5px solid transparent; pointer-events:none; z-index:10; transition:border-color 0.3s,box-shadow 0.3s; }
  #tallyBorder.preview { border-color:#22c55e; box-shadow:inset 0 0 32px rgba(34,197,94,0.2); }
  #tallyBorder.program { border-color:#e53935; box-shadow:inset 0 0 36px rgba(229,57,53,0.25); animation:tallyPulse 1.4s ease-in-out infinite; }
  @keyframes tallyPulse { 0%,100%{box-shadow:inset 0 0 36px rgba(229,57,53,0.25)} 50%{box-shadow:inset 0 0 56px rgba(229,57,53,0.42)} }

  /* ── HUD ── */
  #hud { position:absolute; inset:0; pointer-events:none; z-index:20; }
  #camNameBadge { position:absolute; top:calc(env(safe-area-inset-top,0px) + 14px); left:16px; font-size:11px; font-weight:700; letter-spacing:0.16em; color:rgba(255,255,255,0.45); text-transform:uppercase; max-width:45vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  #tallyPill { position:absolute; top:calc(env(safe-area-inset-top,0px) + 10px); right:14px; display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:100px; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); transition:all 0.3s; }
  .tally-dot-small { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.2); transition:all 0.3s; }
  #tallyPill.preview .tally-dot-small { background:#22c55e; box-shadow:0 0 6px #22c55e; }
  #tallyPill.program .tally-dot-small { background:#e53935; box-shadow:0 0 6px #e53935; animation:dotPulse 1.4s infinite; }
  @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  #tallyLabel { font-size:11px; font-weight:700; letter-spacing:0.12em; color:rgba(255,255,255,0.35); transition:color 0.3s; }
  #tallyPill.preview #tallyLabel { color:#22c55e; }
  #tallyPill.program #tallyLabel { color:#e53935; }

  /* ── CONTROLES DE CÂMERA ── */
  #camControls {
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    pointer-events:auto; z-index:25; opacity:1; transition:opacity 0.4s;
  }
  #camControls.hidden { opacity:0; pointer-events:none; }

  .ctrl-btn {
    width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,0.18);
    background:rgba(0,0,0,0.42); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    color:#fff; font-size:18px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:background 0.15s, transform 0.1s; -webkit-user-select:none;
  }
  .ctrl-btn:active { background:rgba(255,255,255,0.2); transform:scale(0.93); }

  #zoomLabel {
    font-size:12px; font-weight:700; color:rgba(255,255,255,0.7); font-family:'SF Mono','Courier New',monospace;
    background:rgba(0,0,0,0.38); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    padding:4px 8px; border-radius:6px; min-width:44px; text-align:center; letter-spacing:0.04em;
  }

  #lensMenu {
    position:absolute; right:66px; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:8px; z-index:26; opacity:0;
    pointer-events:none; transition:opacity 0.2s;
  }
  #lensMenu.show { opacity:1; pointer-events:auto; }

  .lens-btn {
    padding:8px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.2);
    background:rgba(0,0,0,0.6); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    color:#fff; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
    transition:background 0.15s; text-align:center;
  }
  .lens-btn:active { background:rgba(255,255,255,0.2); }
  .lens-btn.active { border-color:#22c55e; color:#22c55e; }

  /* ── CONN + SAIR ── */
  #connStatus { position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 16px); left:16px; display:flex; align-items:center; gap:5px; pointer-events:auto; }
  .conn-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background 0.3s; }
  .conn-dot.on { background:#22c55e; }
  .conn-dot.err { background:#e53935; }
  #connLabel { font-size:10px; color:rgba(255,255,255,0.22); letter-spacing:0.08em; font-weight:600; }

  #exitBtn { position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 12px); right:14px; padding:6px 14px; border-radius:100px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:rgba(255,255,255,0.25); font-size:11px; font-weight:600; letter-spacing:0.08em; cursor:pointer; pointer-events:auto; }

  /* ── COMANDO OVERLAY ── */
  #cmdOverlay { position:absolute; top:calc(env(safe-area-inset-top,0px) + 48px); left:14px; right:70px; z-index:30; pointer-events:none; opacity:0; transform:translateY(-8px); transition:opacity 0.28s ease,transform 0.32s cubic-bezier(0.34,1.4,0.64,1); }
  #cmdOverlay.show { opacity:1; transform:translateY(0); }
  .cmd-bubble { background:rgba(8,8,14,0.82); backdrop-filter:blur(18px) saturate(200%); -webkit-backdrop-filter:blur(18px) saturate(200%); border-radius:13px; padding:13px 15px; display:flex; align-items:center; gap:12px; border:1px solid rgba(255,255,255,0.09); }
  .cmd-icon-wrap { width:38px; height:38px; border-radius:9px; background:rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .cmd-text-wrap { flex:1; min-width:0; }
  .cmd-from { font-size:9px; font-weight:700; letter-spacing:0.16em; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-bottom:3px; }
  #cmdText { font-size:18px; font-weight:600; color:#fff; line-height:1.25; }

  /* Flash */
  #flashOverlay { position:absolute; inset:0; background:rgba(255,255,255,0); pointer-events:none; z-index:50; transition:background 0.07s; }
  #flashOverlay.flash { background:rgba(255,255,255,0.14); }
</style>
</head>
<body>

<div id="setupScreen">
  <div class="setup-logo">CamCmd · Filmador</div>
  <div id="deviceNameDisplay">Carregando…</div>
  <div class="setup-subtitle">Este nome aparecerá no painel do operador</div>
  <div id="serverWrap">
    <input class="setup-server-input" id="serverInput" type="text" value="" placeholder="ID DA MESA (Ex: CAM1)" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <button class="start-btn" onclick="startCamera()">Iniciar Câmera</button>
</div>

<div id="camScreen">
  <video id="video" autoplay muted playsinline webkit-playsinline></video>

  <div id="tallyBorder"></div>
  <div id="flashOverlay"></div>

  <div id="hud">
    <div id="camNameBadge"></div>
    <div id="tallyPill">
      <div class="tally-dot-small"></div>
      <span id="tallyLabel">OFF</span>
    </div>
    <div id="connStatus">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">DESCONECTADO</span>
    </div>
    <button id="exitBtn" onclick="exitCamera()">SAIR</button>
  </div>

  <div id="camControls">
    <button class="ctrl-btn" id="zoomInBtn" onclick="adjustZoom(0.5)" title="Aproximar">＋</button>
    <div id="zoomLabel">1×</div>
    <button class="ctrl-btn" id="zoomOutBtn" onclick="adjustZoom(-0.5)" title="Afastar">－</button>
    <button class="ctrl-btn" onclick="toggleLensMenu()" title="Trocar câmera">⇄</button>
  </div>

  <div id="lensMenu"></div>

  <div id="cmdOverlay">
    <div class="cmd-bubble">
      <div class="cmd-icon-wrap" id="cmdIcon">📢</div>
      <div class="cmd-text-wrap">
        <div class="cmd-from">Diretor</div>
        <div id="cmdText"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── NOME DO DISPOSITIVO ──
function getDeviceName() {
  const ua = navigator.userAgent;
  if (/iPhone/.test(ua)) return 'iPhone';
  if (/iPad/.test(ua)) return 'iPad';
  const android = ua.match(/Android[^;]*;\s*([^)]+)\)/);
  if (android) return android[1].trim().split(' ').slice(0,3).join(' ');
  return 'Câmera';
}
let deviceName = getDeviceName();
const nameEl = document.getElementById('deviceNameDisplay');
nameEl.textContent = deviceName;
nameEl.addEventListener('click', () => {
  const n = prompt('Nome desta câmera:', deviceName);
  if (n && n.trim()) { deviceName = n.trim(); nameEl.textContent = deviceName; }
});

// ── STATE ──
let peer = null;          // Instância do PeerJS
let dataConn = null;      // Canal de texto e comandos (DataChannel)
let mediaCall = null;     // Conexão do feed de vídeo
let currentTally = 'none';
let pendingCmd = null;
let currentStream = null;
let currentDeviceId = null;
let availableCameras = [];
let zoomLevel = 1.0;
let zoomMin = 1.0;
let zoomMax = 5.0;
let lensMenuOpen = false;

// ── INICIAR CÂMERA ──
async function startCamera(deviceId = null) {
  const constraints = {
    video: deviceId
      ? { deviceId: { exact: deviceId }, width:{ideal:1920}, height:{ideal:1080} }
      : { facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} },
    audio: false
  };

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch(e) {
    alert('Permissão de câmera necessária.');
    return;
  }

  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  currentStream = stream;

  const track = stream.getVideoTracks()[0];
  currentDeviceId = track.getSettings().deviceId;

  await setupZoom(track);

  const video = document.getElementById('video');
  video.srcObject = stream;

  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('camScreen').style.display = 'block';
  document.getElementById('camNameBadge').textContent = deviceName;

  try { await screen.orientation.lock('landscape'); } catch(e) {}
  try { document.documentElement.requestFullscreen?.(); } catch(e) {}

  await loadCameras();
  keepAwake();

  // Executa o pareamento com a mesa do OBS usando PeerJS
  const targetMesaId = document.getElementById('serverInput').value.trim();
  if (targetMesaId) {
    connectToOBS(targetMesaId);
  } else {
    setConn('error');
    alert('Por favor, digite o ID da mesa gerado na tela do OBS.');
  }
}

// ── CONEXÃO DIRETA COM O OBS (PEERJS COM SERVIDORES STUN GOOGLE) ──
function connectToOBS(targetId) {
  setConn('connecting');
  
  if(peer) peer.destroy();
  
  // Limpa o nome do celular removendo espaços para gerar uma ID válida de conexão
  const cleanName = deviceName.replace(/[^a-zA-Z0-9]/g, "-");
  
  // NOVA CONFIGURAÇÃO INTEGRADA COM SERVIDORES STUN DO GOOGLE
  peer = new Peer('CAM-' + cleanName + '-' + Math.floor(100 + Math.random() * 900), {
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ]
    }
  });

  peer.on('open', () => {
    // 1. Cria a conexão de texto para receber Tally e Ordens do Diretor
    dataConn = peer.connect(targetId);
    
    dataConn.on('open', () => {
      setConn('connected');
      console.log("Canal de dados aberto com o OBS.");
      
      // 2. Dispara a chamada de streaming de vídeo para a mesa do OBS
      if (currentStream) {
        mediaCall = peer.call(targetId, currentStream);
      }
    });

    dataConn.on('data', (data) => {
      // Processa os sinais de comando e tally vindos do painel do OBS
      if (data.type === 'command') receiveCommand(data.msg);
      if (data.type === 'tally') setTally(data.state);
    });

    dataConn.on('close', () => { 
      setConn('error'); 
      retryConnection(targetId);
    });
  });

  peer.on('error', (err) => {
    console.error("Erro na infraestrutura PeerJS do telemóvel:", err);
    setConn('error');
    retryConnection(targetId);
  });
}

function retryConnection(targetId) {
  setTimeout(() => {
    if (document.getElementById('camScreen').style.display === 'block') {
      connectToOBS(targetId);
    }
  }, 4000);
}

// ── ZOOM ──
async function setupZoom(track) {
  try {
    const caps = track.getCapabilities();
    if (caps.zoom) {
      zoomMin = caps.zoom.min || 1;
      zoomMax = caps.zoom.max || 5;
      zoomLevel = caps.zoom.min || 1;
      updateZoomLabel();
    }
  } catch(e) {}
}

async function adjustZoom(delta) {
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  try {
    const caps = track.getCapabilities();
    if (!caps.zoom) {
      zoomLevel = Math.max(1, Math.min(5, zoomLevel + delta));
      document.getElementById('video').style.transform = `scale(${zoomLevel})`;
      updateZoomLabel();
      return;
    }
    zoomLevel = Math.max(zoomMin, Math.min(zoomMax, zoomLevel + delta));
    await track.applyConstraints({ advanced: [{ zoom: zoomLevel }] });
    updateZoomLabel();
  } catch(e) {
    zoomLevel = Math.max(1, Math.min(5, zoomLevel + delta));
    document.getElementById('video').style.transform = `scale(${zoomLevel})`;
    updateZoomLabel();
  }
}

function updateZoomLabel() {
  document.getElementById('zoomLabel').textContent = zoomLevel.toFixed(1).replace('.0','') + '×';
}

// Pinça para zoom
let pinchStart = null;
let pinchZoomStart = 1;
document.addEventListener('touchstart', e => {
  if (e.touches.length === 2 && document.getElementById('camScreen').style.display !== 'none') {
    pinchStart = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    pinchZoomStart = zoomLevel;
  }
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStart) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const scale = dist / pinchStart;
    const newZoom = Math.max(zoomMin, Math.min(zoomMax, pinchZoomStart * scale));
    if (Math.abs(newZoom - zoomLevel) > 0.05) {
      zoomLevel = newZoom;
      applyZoomDirect(zoomLevel);
      updateZoomLabel();
    }
  }
}, { passive: true });
document.addEventListener('touchend', () => { pinchStart = null; });

async function applyZoomDirect(zoom) {
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  try {
    const caps = track.getCapabilities();
    if (caps.zoom) { await track.applyConstraints({ advanced: [{ zoom: zoom }] }); return; }
  } catch(e) {}
  document.getElementById('video').style.transform = `scale(${zoom})`;
}

// ── CÂMERAS DISPONÍVEIS ──
async function loadCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    availableCameras = devices.filter(d => d.kind === 'videoinput');
    renderLensMenu();
  } catch(e) {}
}

function renderLensMenu() {
  const menu = document.getElementById('lensMenu');
  menu.innerHTML = '';

  const labels = availableCameras.map((cam, i) => {
    const label = cam.label || `Câmera ${i+1}`;
    let name = label;
    if (/back|rear|environment|principal|wide/i.test(label)) name = '🔭 Traseira';
    if (/ultra|0\.5|wide.*back/i.test(label)) name = '🌐 Ultra-Wide';
    if (/tele|2×|3×|zoom.*back/i.test(label)) name = '🔍 Teleobjetiva';
    if (/front|face|selfie/i.test(label)) name = '🤳 Frontal';
    return { cam, name };
  });

  labels.forEach(({ cam, name }) => {
    const btn = document.createElement('button');
    btn.className = 'lens-btn' + (cam.deviceId === currentDeviceId ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => switchCamera(cam.deviceId);
    menu.appendChild(btn);
  });

  document.getElementById('camControls').querySelector('[title="Trocar câmera"]').style.display =
    availableCameras.length <= 1 ? 'none' : 'flex';
}

async function switchCamera(deviceId) {
  zoomLevel = 1;
  updateZoomLabel();
  document.getElementById('video').style.transform = '';
  toggleLensMenu();
  await startCamera(deviceId);
}

function toggleLensMenu() {
  lensMenuOpen = !lensMenuOpen;
  document.getElementById('lensMenu').classList.toggle('show', lensMenuOpen);
}

document.addEventListener('touchstart', e => {
  if (lensMenuOpen && !e.target.closest('#lensMenu') && !e.target.closest('[title="Trocar câmera"]')) {
    lensMenuOpen = false;
    document.getElementById('lensMenu').classList.remove('remove');
  }
}, { passive: true });

let hideTimer;
function resetHideTimer() {
  document.getElementById('camControls').classList.remove('hidden');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => {
    document.getElementById('camControls').classList.add('hidden');
  }, 4000);
}
document.addEventListener('touchstart', resetHideTimer, { passive: true });

// ── TALLY ──
function setTally(state) {
  const prev = currentTally;
  currentTally = state;
  document.getElementById('tallyBorder').className = state;
  document.getElementById('tallyPill').className   = state;
  document.getElementById('tallyLabel').textContent = state==='program'?'AO VIVO':state==='preview'?'PRÉVIA':'OFF';
  if (state === 'program') hideCommand();
  if (prev === 'program' && state !== 'program' && pendingCmd) showCommand(pendingCmd);
}

// ── COMANDO ──
const cmdIcons = { 'ação':'🎬','corta':'✋','aproxima':'🔍','zoom in':'🔍','afasta':'🔭','zoom out':'🔭','plano':'📐','close':'👤','stand by':'⏳','standby':'⏳','atenção':'⚠️','move':'↔️','pan':'↔️','tilt':'↕️','foco':'🎯','focus':'🎯' };
function guessIcon(msg) { const l=msg.toLowerCase(); for(const[k,v] of Object.entries(cmdIcons)) if(l.includes(k)) return v; return '📢'; }

function receiveCommand(msg) {
  pendingCmd = msg;
  if (currentTally !== 'program') showCommand(msg);
}
function showCommand(msg) {
  document.getElementById('cmdText').textContent = msg;
  document.getElementById('cmdIcon').textContent = guessIcon(msg);
  document.getElementById('cmdOverlay').classList.add('show');
  flashScreen(); vibrate();
}
function hideCommand() { document.getElementById('cmdOverlay').classList.remove('show'); }

function flashScreen() {
  const f = document.getElementById('flashOverlay');
  f.classList.add('flash');
  setTimeout(() => f.classList.remove('flash'), 110);
}
function vibrate() { try { navigator.vibrate?.([35,25,35]); } catch(e) {} }

// ── CONN ──
function setConn(state) {
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  if(state==='connected'){dot.className='conn-dot on';lbl.textContent='CONECTADO';}
  else if(state==='error'){dot.className='conn-dot err';lbl.textContent='DESCONECTADO';}
  else{dot.className='conn-dot';lbl.textContent='CONECTANDO…';}
}

// ── SAIR ──
function exitCamera() {
  if (confirm('Sair da câmera?')) {
    if (mediaCall) mediaCall.close();
    if (dataConn) dataConn.close();
    if (peer) peer.destroy();
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    document.getElementById('camScreen').style.display = 'none';
    document.getElementById('setupScreen').style.display = 'flex';
    try { document.exitFullscreen?.(); } catch(e) {}
  }
}

// ── WAKE LOCK ──
async function keepAwake() {
  try { if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
  document.addEventListener('visibilitychange', async () => { if(document.visibilityState==='visible') keepAwake(); });
}
</script>
</body>
</html>
