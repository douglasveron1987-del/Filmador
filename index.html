<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="mobile-web-app-capable" content="yes">
<title>Filmador</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; background:#000; overflow:hidden; font-family:'Helvetica Neue',Arial,sans-serif; -webkit-user-select:none; user-select:none; }

  /* ── SETUP ── */
  #setup {
    position:fixed; inset:0; background:#0c0c0e;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; padding:40px 32px;
  }
  .logo { font-size:10px; font-weight:700; letter-spacing:0.3em; color:rgba(255,255,255,0.18); text-transform:uppercase; margin-bottom:48px; }
  #devName { font-size:28px; font-weight:600; color:#fff; text-align:center; margin-bottom:8px; cursor:pointer; }
  .sub { font-size:14px; color:rgba(255,255,255,0.3); margin-bottom:16px; text-align:center; }

  .obs-config { width:100%; max-width:300px; margin-bottom:32px; }
  .obs-config label { font-size:11px; font-weight:700; letter-spacing:0.1em; color:rgba(255,255,255,0.25); text-transform:uppercase; display:block; margin-bottom:8px; }
  .obs-input {
    width:100%; background:rgba(255,255,255,0.05);
    border:1.5px solid rgba(255,255,255,0.1); border-radius:10px;
    color:#fff; font-size:14px; padding:12px 16px; outline:none;
    text-align:center; font-family:'SF Mono','Courier New',monospace;
    -webkit-appearance:none; transition:border-color 0.2s;
  }
  .obs-input:focus { border-color:rgba(255,255,255,0.3); }

  .start { width:100%; max-width:300px; padding:18px; border-radius:16px; border:none; background:#fff; color:#000; font-size:17px; font-weight:700; cursor:pointer; transition:opacity 0.15s,transform 0.1s; }
  .start:active { opacity:0.75; transform:scale(0.98); }

  /* ── CAM SCREEN ── */
  #cam { position:fixed; inset:0; display:none; }
  video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }

  /* ── TALLY BORDER ── */
  #tb { position:absolute; inset:0; border:5px solid transparent; pointer-events:none; z-index:10; transition:all 0.3s; }
  #tb.preview { border-color:#22c55e; box-shadow:inset 0 0 32px rgba(34,197,94,0.2); }
  #tb.program { border-color:#e53935; box-shadow:inset 0 0 36px rgba(229,57,53,0.25); animation:tp 1.4s ease-in-out infinite; }
  @keyframes tp { 0%,100%{box-shadow:inset 0 0 36px rgba(229,57,53,0.25)} 50%{box-shadow:inset 0 0 56px rgba(229,57,53,0.42)} }

  /* ── HUD ── */
  #hud { position:absolute; inset:0; pointer-events:none; z-index:20; }
  #badge { position:absolute; top:calc(env(safe-area-inset-top,0px) + 14px); left:16px; font-size:11px; font-weight:700; letter-spacing:0.16em; color:rgba(255,255,255,0.45); text-transform:uppercase; }
  #tpill { position:absolute; top:calc(env(safe-area-inset-top,0px) + 10px); right:14px; display:flex; align-items:center; gap:5px; padding:5px 11px; border-radius:100px; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); transition:all 0.3s; }
  .td { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,0.2); transition:all 0.3s; }
  #tpill.preview .td { background:#22c55e; box-shadow:0 0 6px #22c55e; }
  #tpill.program .td { background:#e53935; box-shadow:0 0 6px #e53935; animation:dp 1.4s infinite; }
  @keyframes dp { 0%,100%{opacity:1} 50%{opacity:0.25} }
  #tlbl { font-size:11px; font-weight:700; letter-spacing:0.12em; color:rgba(255,255,255,0.35); transition:color 0.3s; }
  #tpill.preview #tlbl { color:#22c55e; }
  #tpill.program #tlbl { color:#e53935; }

  #conn { position:absolute; bottom:calc(env(safe-area-inset-bottom,0px)+16px); left:16px; display:flex; align-items:center; gap:5px; pointer-events:auto; }
  .cnd { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); transition:background 0.3s; }
  .cnd.on { background:#22c55e; }
  .cnd.err { background:#e53935; }
  #clbl { font-size:10px; color:rgba(255,255,255,0.22); letter-spacing:0.08em; font-weight:600; }

  #exit { position:absolute; bottom:calc(env(safe-area-inset-bottom,0px)+12px); right:14px; padding:6px 14px; border-radius:100px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:rgba(255,255,255,0.25); font-size:11px; font-weight:600; cursor:pointer; pointer-events:auto; }

  /* ── CONTROLES ── */
  #ctrls { position:absolute; right:14px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:auto; z-index:25; transition:opacity 0.4s; }
  #ctrls.hidden { opacity:0; pointer-events:none; }
  .cb { width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,0.18); background:rgba(0,0,0,0.42); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); color:#fff; font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; }
  .cb:active { background:rgba(255,255,255,0.2); transform:scale(0.93); }
  #zlbl { font-size:12px; font-weight:700; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.38); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); padding:4px 8px; border-radius:6px; min-width:44px; text-align:center; }

  /* ── COMANDO OVERLAY ── */
  #cmdOv { position:absolute; top:calc(env(safe-area-inset-top,0px)+48px); left:14px; right:70px; z-index:30; pointer-events:none; opacity:0; transform:translateY(-8px); transition:opacity 0.28s ease,transform 0.32s cubic-bezier(0.34,1.4,0.64,1); }
  #cmdOv.show { opacity:1; transform:translateY(0); }
  .cb2 { background:rgba(8,8,14,0.82); backdrop-filter:blur(18px) saturate(200%); -webkit-backdrop-filter:blur(18px) saturate(200%); border-radius:13px; padding:13px 15px; display:flex; align-items:center; gap:12px; border:1px solid rgba(255,255,255,0.09); }
  .ci { width:38px; height:38px; border-radius:9px; background:rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .ct { flex:1; min-width:0; }
  .cf { font-size:9px; font-weight:700; letter-spacing:0.16em; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-bottom:3px; }
  #ctxt { font-size:18px; font-weight:600; color:#fff; line-height:1.25; }

  #flash { position:absolute; inset:0; background:rgba(255,255,255,0); pointer-events:none; z-index:50; transition:background 0.07s; }
  #flash.fl { background:rgba(255,255,255,0.14); }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">CamCmd · Filmador</div>
  <div id="devName">Carregando...</div>
  <div class="sub">Nome que aparecerá no OBS</div>

  <div class="obs-config">
    <label>IP do computador com OBS</label>
    <input class="obs-input" id="obsIp" type="text" value="192.168.1.8" placeholder="192.168.1.X" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <button class="start" onclick="iniciar()">Iniciar Câmera</button>
</div>

<!-- CAM SCREEN -->
<div id="cam">
  <video id="video" autoplay muted playsinline webkit-playsinline></video>
  <div id="tb"></div>
  <div id="flash"></div>
  <div id="hud">
    <div id="badge"></div>
    <div id="tpill"><div class="td"></div><span id="tlbl">OFF</span></div>
    <div id="conn"><div class="cnd" id="cnd"></div><span id="clbl">CONECTANDO...</span></div>
    <button id="exit" onclick="sair()">SAIR</button>
  </div>
  <div id="ctrls">
    <button class="cb" onclick="ajZoom(0.5)">＋</button>
    <div id="zlbl">1×</div>
    <button class="cb" onclick="ajZoom(-0.5)">－</button>
    <button class="cb" onclick="flipCam()">⇄</button>
  </div>
  <div id="cmdOv">
    <div class="cb2">
      <div class="ci" id="cico">📢</div>
      <div class="ct">
        <div class="cf">Diretor</div>
        <div id="ctxt"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── NOME DO DISPOSITIVO ──
var devName = (function() {
  var ua = navigator.userAgent;
  if (/iPhone/.test(ua)) return 'iPhone';
  if (/iPad/.test(ua)) return 'iPad';
  var m = ua.match(/Android[^;]*;\s*([^)]+)\)/);
  if (m) return m[1].trim().split(' ').slice(0,3).join(' ');
  return 'Câmera';
})();

document.getElementById('devName').textContent = devName;
document.getElementById('devName').addEventListener('click', function() {
  var n = prompt('Nome desta câmera:', devName);
  if (n && n.trim()) { devName = n.trim(); document.getElementById('devName').textContent = devName; }
});

// ── STATE ──
var ws = null;
var tally = 'none';
var pendingCmd = null;
var stream = null;
var zoomLvl = 1;
var facingMode = 'environment';
var obsIp = '192.168.1.8';
var myCamName = ''; // nome da cena no OBS que corresponde a esta câmera

// ── INICIAR ──
async function iniciar() {
  obsIp = document.getElementById('obsIp').value.trim();

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
  } catch(e) {
    alert('Permissão de câmera necessária. Habilite nas configurações do Safari.');
    return;
  }

  document.getElementById('setup').style.display = 'none';
  document.getElementById('cam').style.display = 'block';
  document.getElementById('video').srcObject = stream;
  document.getElementById('badge').textContent = devName;

  try { await screen.orientation.lock('landscape'); } catch(e) {}
  try { document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); } catch(e) {}

  keepAwake();
  connectOBS();
}

// ── CONECTAR AO OBS WEBSOCKET ──
// O OBS WebSocket atua como relay de comandos
// O app se conecta diretamente ao OBS na porta 4455
function connectOBS() {
  setConn(false, 'CONECTANDO...');
  var url = 'ws://' + obsIp + ':4455';

  try { ws = new WebSocket(url); } catch(e) { retry(); return; }

  ws.onopen = function() {
    // Protocolo OBS WebSocket v5 — identificação
    ws.send(JSON.stringify({ op: 1, d: { rpcVersion: 1 } }));
  };

  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);

    // op 2 = Hello (identificação OK)
    if (msg.op === 2) {
      setConn(true, 'OBS CONECTADO');
      // Subscreve eventos de cena
      ws.send(JSON.stringify({
        op: 6,
        d: {
          requestType: 'GetSceneList',
          requestId: 'getScenes'
        }
      }));
      // Pede cenas atuais
      ws.send(JSON.stringify({ op: 6, d: { requestType: 'GetCurrentProgramScene', requestId: 'getProg' } }));
      ws.send(JSON.stringify({ op: 6, d: { requestType: 'GetCurrentPreviewScene', requestId: 'getPrev' } }));
    }

    // op 5 = Evento
    if (msg.op === 5) {
      var ev = msg.d;

      // Cena do programa mudou
      if (ev.eventType === 'CurrentProgramSceneChanged') {
        var prog = ev.eventData.sceneName;
        updateTally(prog, null);
      }

      // Cena da prévia mudou
      if (ev.eventType === 'CurrentPreviewSceneChanged') {
        var prev = ev.eventData.sceneName;
        updateTally(null, prev);
      }

      // Recebe comando via OBS (enviado pelo Dock do operador via SceneItemSelected ou InputVolumeChanged como hack)
      // Usamos o evento de filtro de cena como canal de mensagem
      if (ev.eventType === 'SceneItemSelected') {
        // não usado aqui
      }
      // Recebe comando do operador via BroadcastCustomEvent
      if (ev.eventType === 'CustomEvent') {
        var ed = ev.eventData;
        if (ed && ed.type === 'camcmd') {
          var target = ed.target || '';
          var myScene = devName.toUpperCase().replace(/\s/g, '');
          if (target === 'ALL' || target.toUpperCase().replace(/\s/g, '') === myScene) {
            recvCmd(ed.msg);
          }
        }
      }
    }

    // op 7 = Resposta de request
    if (msg.op === 7) {
      var d = msg.d;
      if (d.requestId === 'getProg' && d.responseData) {
        currentProgram = d.responseData.currentProgramSceneName;
        updateTally(currentProgram, null);
      }
      if (d.requestId === 'getPrev' && d.responseData) {
        currentPreview = d.responseData.currentPreviewSceneName;
        updateTally(null, currentPreview);
      }
    }
  };

  ws.onclose = function() { setConn(false, 'RECONECTANDO...'); retry(); };
  ws.onerror = function() { setConn(false, 'ERRO'); };
}

var currentProgram = '';
var currentPreview = '';

function updateTally(prog, prev) {
  if (prog !== null) currentProgram = prog;
  if (prev !== null) currentPreview = prev;

  // Verifica se esta câmera é a que está na prévia ou programa
  // Compara o nome do dispositivo com o nome da cena (CAM1, CAM2, etc)
  var myScene = devName.toUpperCase().replace(/\s/g,'');

  var newTally = 'none';
  if (currentProgram.toUpperCase().replace(/\s/g,'') === myScene) newTally = 'program';
  else if (currentPreview.toUpperCase().replace(/\s/g,'') === myScene) newTally = 'preview';

  setTally(newTally);
}

// ── TALLY ──
function setTally(state) {
  var prev = tally;
  tally = state;
  document.getElementById('tb').className = state;
  document.getElementById('tpill').className = state;
  document.getElementById('tlbl').textContent = state === 'program' ? 'AO VIVO' : state === 'preview' ? 'PRÉVIA' : 'OFF';
  if (state === 'program') hideCmd();
  if (prev === 'program' && state !== 'program' && pendingCmd) showCmd(pendingCmd);
}

// ── COMANDO ──
var icons = { 'ação':'🎬','corta':'✋','aproxima':'🔍','afasta':'🔭','plano':'📐','close':'👤','stand by':'⏳','atenção':'⚠️','move':'↔️','foco':'🎯' };
function guessIcon(msg) { var l = msg.toLowerCase(); for (var k in icons) if (l.indexOf(k) > -1) return icons[k]; return '📢'; }

function recvCmd(msg) {
  pendingCmd = msg;
  if (tally !== 'program') showCmd(msg);
}
function showCmd(msg) {
  document.getElementById('ctxt').textContent = msg;
  document.getElementById('cico').textContent = guessIcon(msg);
  document.getElementById('cmdOv').classList.add('show');
  doFlash(); vibrate();
}
function hideCmd() { document.getElementById('cmdOv').classList.remove('show'); }
function doFlash() { var f = document.getElementById('flash'); f.classList.add('fl'); setTimeout(function() { f.classList.remove('fl'); }, 110); }
function vibrate() { try { navigator.vibrate && navigator.vibrate([35,25,35]); } catch(e) {} }

// ── CONN STATUS ──
function setConn(on, txt) {
  document.getElementById('cnd').className = 'cnd' + (on ? ' on' : ' err');
  document.getElementById('clbl').textContent = txt || (on ? 'CONECTADO' : 'RECONECTANDO...');
}
function retry() { setTimeout(connectOBS, 4000); }

// ── ZOOM ──
function ajZoom(d) {
  zoomLvl = Math.max(1, Math.min(5, zoomLvl + d));
  document.getElementById('video').style.transform = 'scale(' + zoomLvl + ')';
  document.getElementById('zlbl').textContent = zoomLvl.toFixed(1).replace('.0','') + '×';
}

// Pinça
var pinchStart = null, pinchZoomStart = 1;
document.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) { pinchStart = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); pinchZoomStart = zoomLvl; }
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2 && pinchStart) {
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoomLvl = Math.max(1, Math.min(5, pinchZoomStart * (d / pinchStart)));
    document.getElementById('video').style.transform = 'scale(' + zoomLvl + ')';
    document.getElementById('zlbl').textContent = zoomLvl.toFixed(1).replace('.0','') + '×';
  }
}, { passive: true });
document.addEventListener('touchend', function() { pinchStart = null; }, { passive: true });

// ── FLIP CAM ──
async function flipCam() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: facingMode } }, audio: false });
    document.getElementById('video').srcObject = stream;
  } catch(e) {}
}

// Auto-hide controles
var hideTimer;
function resetHide() { document.getElementById('ctrls').classList.remove('hidden'); clearTimeout(hideTimer); hideTimer = setTimeout(function() { document.getElementById('ctrls').classList.add('hidden'); }, 4000); }
document.addEventListener('touchstart', resetHide, { passive: true });

// Wake Lock
async function keepAwake() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
  document.addEventListener('visibilitychange', async function() { if (document.visibilityState === 'visible') keepAwake(); });
}

// Sair
function sair() {
  if (confirm('Sair da câmera?')) {
    if (ws) ws.close();
    if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
    document.getElementById('cam').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
    try { document.exitFullscreen && document.exitFullscreen(); } catch(e) {}
  }
}
</script>
</body>
</html>
